<html lang="en">
<head>

  <meta property="og:description" content="Free interactive wizard that builds your AI agent's complete workspace. 40+ deep questions, 7 production-grade files.">

  <meta name="twitter:description" content="Free interactive wizard that builds your AI agent's complete workspace. 40+ deep questions, 7 production-grade files.">

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,600&display=swap" rel="stylesheet">

  <style>
    :root {
      --red: #E8001A;
      --black: #0A0A0A;
      --white: #F2F0EB;
      --gray: #1A1A1A;
      --gray-mid: #2A2A2A;
      --mono: 'DM Mono', monospace;
      --display: 'Bebas Neue', sans-serif;
      --body: 'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: var(--body);
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.4;
    }

    /* NAV */
    .top-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 16px 32px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid rgba(242,240,235,0.06);
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(12px);
    }
    .top-bar a {
      font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--white); text-decoration: none; opacity: 0.5;
      transition: opacity 0.2s;
    }
    .top-bar a:hover { opacity: 1; color: var(--red); }
    .top-bar .logo { opacity: 0.7; font-size: 12px; letter-spacing: 0.15em; }
    .top-bar .logo span { color: var(--red); }
    .step-counter {
      font-family: var(--mono); font-size: 10px; color: rgba(242,240,235,0.3);
      letter-spacing: 0.1em;
    }

    /* PROGRESS */
    .progress-bar { width: 100%; height: 2px; background: var(--gray); }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, var(--red), #ff4433);
      transition: width 0.5s ease;
    }

    /* CONTAINER */
    .app {
      max-width: 720px; margin: 0 auto;
      padding: 100px 24px 60px;
      min-height: 100vh;
    }

    /* SECTION TITLE */
    .section-tag {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.25em;
      text-transform: uppercase; color: var(--red); margin-bottom: 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .section-tag::after {
      content: ''; flex: 1; height: 1px; background: rgba(232,0,26,0.2); max-width: 80px;
    }
    .section-title {
      font-family: var(--display); font-size: clamp(36px, 6vw, 56px);
      line-height: 0.95; margin-bottom: 8px; letter-spacing: 1px;
    }
    .section-title em { font-style: normal; color: var(--red); }
    .section-sub {
      font-size: 14px; font-weight: 300; color: rgba(242,240,235,0.45);
      margin-bottom: 40px; line-height: 1.7; max-width: 560px;
    }

    /* FORM ELEMENTS */
    .field { margin-bottom: 28px; }
    .field-label {
      display: block; font-family: var(--mono); font-size: 13px;
      color: var(--white); margin-bottom: 6px; line-height: 1.5;
    }
    .field-hint {
      font-size: 11px; color: rgba(242,240,235,0.3); margin-bottom: 8px;
      font-style: italic; line-height: 1.5;
    }
    input[type="text"], input[type="email"], textarea {
      width: 100%; padding: 14px 18px;
      background: var(--gray); border: 1px solid rgba(242,240,235,0.1);
      border-radius: 0; color: var(--white);
      font-family: var(--mono); font-size: 13px;
      outline: none; transition: border-color 0.2s;
      resize: vertical;
    }
    input:focus, textarea:focus { border-color: rgba(232,0,26,0.5); }
    input::placeholder, textarea::placeholder { color: rgba(242,240,235,0.2); }

    /* OPTION GRID */
    .option-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 8px; margin-bottom: 20px;
    }
    .option-btn {
      padding: 16px 18px; background: var(--gray);
      border: 1px solid rgba(242,240,235,0.06); cursor: pointer;
      text-align: left; transition: all 0.2s; position: relative;
    }
    .option-btn:hover { border-color: rgba(242,240,235,0.15); }
    .option-btn.selected {
      border-color: var(--red); background: rgba(232,0,26,0.06);
    }
    .option-btn.selected::before {
      content: ''; position: absolute; top: 0; left: 0;
      width: 3px; height: 100%; background: var(--red);
    }
    .option-btn .opt-title {
      font-family: var(--mono); font-size: 12px; font-weight: 500;
      margin-bottom: 4px; transition: color 0.2s;
    }
    .option-btn.selected .opt-title { color: var(--red); }
    .option-btn .opt-desc {
      font-size: 11px; color: rgba(242,240,235,0.35); line-height: 1.4;
    }

    /* CHIP SELECT */
    .chip-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .chip {
      padding: 8px 16px; background: var(--gray);
      border: 1px solid rgba(242,240,235,0.06); cursor: pointer;
      font-family: var(--mono); font-size: 11px; color: rgba(242,240,235,0.5);
      transition: all 0.2s;
    }
    .chip:hover { border-color: rgba(242,240,235,0.15); }
    .chip.selected { border-color: var(--red); color: var(--red); background: rgba(232,0,26,0.06); }

    /* BUTTONS */
    .btn-row {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 48px; padding-bottom: 40px;
    }
    .btn-next {
      padding: 14px 36px; background: var(--red); border: none;
      color: var(--white); font-family: var(--mono); font-size: 12px;
      letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-next:hover { background: #ff001f; transform: translateY(-1px); }
    .btn-next:disabled { background: var(--gray-mid); color: rgba(242,240,235,0.2); cursor: default; transform: none; }
    .btn-back {
      padding: 14px 24px; background: transparent;
      border: 1px solid rgba(242,240,235,0.1); color: rgba(242,240,235,0.4);
      font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em;
      text-transform: uppercase; cursor: pointer; transition: all 0.2s;
    }
    .btn-back:hover { border-color: rgba(242,240,235,0.3); color: var(--white); }

    /* REVIEW */
    .review-block {
      margin-bottom: 20px; padding: 20px 24px;
      background: var(--gray); border-left: 3px solid var(--red);
    }
    .review-label {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--red); margin-bottom: 12px;
    }
    .review-item { margin-bottom: 8px; }
    .review-item .ri-label {
      font-family: var(--mono); font-size: 10px; color: rgba(242,240,235,0.35);
      letter-spacing: 0.05em;
    }
    .review-item .ri-value {
      font-size: 13px; color: var(--white); margin-top: 2px;
      white-space: pre-wrap; line-height: 1.5;
    }

    /* OUTPUT */
    .output-box {
      position: relative; background: var(--gray);
      border: 1px solid rgba(242,240,235,0.08); padding: 24px;
      max-height: 500px; overflow-y: auto;
      font-family: var(--mono); font-size: 12px; color: rgba(242,240,235,0.7);
      line-height: 1.6; white-space: pre-wrap; word-break: break-word;
    }
    .copy-btn {
      position: absolute; top: 12px; right: 12px;
      padding: 8px 16px; background: var(--black);
      border: 1px solid rgba(242,240,235,0.15); color: rgba(242,240,235,0.5);
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em;
      text-transform: uppercase; cursor: pointer; transition: all 0.2s; z-index: 2;
    }
    .copy-btn:hover { border-color: var(--red); color: var(--red); }

    /* UPSELL */
    .upsell {
      margin-top: 40px; padding: 28px 32px;
      background: rgba(232,0,26,0.04); border: 1px solid rgba(232,0,26,0.15);
    }
    .upsell h3 {
      font-family: var(--display); font-size: 28px; margin-bottom: 8px;
    }
    .upsell p {
      font-size: 13px; color: rgba(242,240,235,0.5); margin-bottom: 16px; line-height: 1.6;
    }
    .upsell a {
      display: inline-block; padding: 12px 28px; background: var(--red);
      color: var(--white); text-decoration: none; font-family: var(--mono);
      font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
      transition: background 0.2s;
    }
    .upsell a:hover { background: #ff001f; }

    /* WELCOME */
    .welcome {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; min-height: 70vh;
    }
    .welcome .big-icon { font-size: 56px; margin-bottom: 20px; filter: drop-shadow(0 0 20px rgba(232,0,26,0.3)); }
    .welcome h1 {
      font-family: var(--display); font-size: clamp(48px, 8vw, 72px);
      letter-spacing: 3px; margin-bottom: 4px; line-height: 1;
    }
    .welcome .by-line {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.2em;
      color: var(--red); text-transform: uppercase; margin-bottom: 32px;
    }
    .welcome p {
      font-size: 15px; color: rgba(242,240,235,0.5); max-width: 460px;
      line-height: 1.7; margin-bottom: 40px;
    }
    .welcome .start-btn {
      padding: 16px 48px; background: transparent;
      border: 2px solid var(--red); color: var(--red);
      font-family: var(--display); font-size: 20px; letter-spacing: 4px;
      text-transform: uppercase; cursor: pointer; transition: all 0.3s;
    }
    .welcome .start-btn:hover { background: var(--red); color: var(--black); }
    .welcome .meta {
      font-family: var(--mono); font-size: 10px; color: rgba(242,240,235,0.2);
      margin-top: 24px; letter-spacing: 0.1em;
    }

    /* HIDDEN */
    .hidden { display: none !important; }

    /* FADE IN */
    .step { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 600px) {
      .option-grid { grid-template-columns: 1fr; }
      .app { padding: 80px 16px 40px; }
      .top-bar { padding: 12px 16px; }
    }
  </style>
<script defer data-domain="acridautomation.com" src="https://analytics.acridautomation.com/js/script.file-downloads.hash.outbound-links.pageview-props.revenue.tagged-events.js"></script>

<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <a href="https://acridautomation.com" class="logo">Acrid<span>.</span>Automation</a>
    <span class="step-counter" id="stepCounter"></span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>

  <!-- APP -->
  <div class="app" id="app"></div>

  <script>
    const SCRIPT_URL = '<YOUR_GOOGLE_APPS_SCRIPT_URL>';

    const PURPOSE_OPTIONS = [
      { id:'content', title:'Content Creator', desc:'Writes, publishes, manages content pipeline' },
      { id:'assistant', title:'Personal Assistant', desc:'Calendar, email, tasks, daily ops' },
      { id:'support', title:'Customer Support', desc:'Tickets, answers, escalation' },
      { id:'dev', title:'Dev Assistant', desc:'Codes, reviews, debugs, deploys' },
      { id:'research', title:'Research Agent', desc:'Finds, synthesizes, reports' },
      { id:'sales', title:'Sales / GTM', desc:'Outreach, lead gen, pipeline' },
      { id:'ops', title:'Business Operator', desc:'Workflows, processes, reports' },
      { id:'creative', title:'Creative Partner', desc:'Brainstorms, designs, ideates' },
      { id:'custom', title:'Something Else', desc:'I\'ll describe it' },
    ];
    const ARCHETYPE_OPTIONS = [
      { id:'blunt', title:'Blunt & Direct', desc:'No fluff. Says it straight.' },
      { id:'warm', title:'Warm & Supportive', desc:'Encouraging, patient.' },
      { id:'witty', title:'Witty & Sharp', desc:'Clever humor, quick thinking.' },
      { id:'scholarly', title:'Scholarly & Precise', desc:'Thorough, evidence-based.' },
      { id:'chaotic', title:'Chaotic Creative', desc:'Unpredictable, surprising.' },
      { id:'professional', title:'Calm Professional', desc:'Polished, reliable.' },
      { id:'mentor', title:'Tough Mentor', desc:'Pushes you, high standards.' },
      { id:'custom', title:'I\'ll Describe It', desc:'None of these fit.' },
    ];
    const MEMORY_OPTIONS = [
      { id:'index', title:'Index-Based', desc:'Memory.md points to files. Lean, scalable.' },
      { id:'flat', title:'Single File', desc:'All in one. Simple but hits token limits.' },
      { id:'daily', title:'Daily Logs', desc:'New file each day. Good for journaling.' },
      { id:'hybrid', title:'Hybrid', desc:'Index + daily logs + topic files. Most flexible.' },
    ];
    const TOOL_OPTIONS = [
      'Web Search','Email','Calendar','Slack/Discord','Google Drive','Notion',
      'GitHub','Database','Social Media APIs','CRM','File System',
      'Code Execution','Image Generation','Custom APIs'
    ];

    let currentStep = 0;
    const totalSteps = 10;
    let data = {};

    function $(sel) { return document.querySelector(sel); }
    function app() { return $('#app'); }
    function updateProgress() {
      $('#progressFill').style.width = `${(currentStep / (totalSteps - 1)) * 100}%`;
      $('#stepCounter').textContent = currentStep > 0 && currentStep < totalSteps - 1 ? `${currentStep} / ${totalSteps - 1}` : '';
    }
    function goTo(step) {
      currentStep = step;
      updateProgress();
      window.scrollTo({ top: 0, behavior: 'smooth' });
      render();
    }
    function save(key, val) { data[key] = val; }
    function get(key) { return data[key] || ''; }

    function makeOptionGrid(options, dataKey, multi) {
      const current = multi ? (get(dataKey) || []) : get(dataKey);
      return `<div class="option-grid">${options.map(o => {
        const sel = multi ? current.includes(o.id) : current === o.id;
        return `<div class="option-btn ${sel ? 'selected' : ''}" onclick="toggleOption('${dataKey}','${o.id}',${multi})">
          <div class="opt-title">${o.title}</div>
          <div class="opt-desc">${o.desc}</div>
        </div>`;
      }).join('')}</div>`;
    }
    function makeChipGrid(options, dataKey) {
      const current = get(dataKey) || [];
      return `<div class="chip-grid">${options.map(o => {
        const sel = current.includes(o);
        return `<div class="chip ${sel ? 'selected' : ''}" onclick="toggleChip('${dataKey}','${o.replace(/'/g,"\\'")}')\">${o}</div>`;
      }).join('')}</div>`;
    }
    function makeField(key, label, placeholder, hint, multiline) {
      return `<div class="field">
        <label class="field-label">${label}</label>
        ${hint ? `<div class="field-hint">${hint}</div>` : ''}
        ${multiline
          ? `<textarea rows="4" placeholder="${placeholder}" oninput="save('${key}',this.value)">${get(key)}</textarea>`
          : `<input type="text" placeholder="${placeholder}" value="${get(key)}" oninput="save('${key}',this.value)">`
        }
      </div>`;
    }
    function makeNav(canProceed) {
      return `<div class="btn-row">
        ${currentStep > 1 ? `<button class="btn-back" onclick="goTo(${currentStep - 1})">← Back</button>` : '<div></div>'}
        <button class="btn-next" ${canProceed ? '' : 'disabled'} onclick="goTo(${currentStep + 1})">${currentStep === totalSteps - 2 ? 'Review →' : 'Next →'}</button>
      </div>`;
    }

    window.toggleOption = function(key, id, multi) {
      if (multi) {
        let arr = get(key) || [];
        arr = arr.includes(id) ? arr.filter(x => x !== id) : [...arr, id];
        save(key, arr);
      } else {
        save(key, id);
      }
      render();
    };
    window.toggleChip = function(key, val) {
      let arr = get(key) || [];
      arr = arr.includes(val) ? arr.filter(x => x !== val) : [...arr, val];
      save(key, arr);
      render();
    };

    function render() {
      const steps = [renderWelcome, renderPurpose, renderSoul, renderIdentity, renderUser, renderOps, renderTools, renderMemory, renderSkills, renderReview, renderOutput];
      if (steps[currentStep]) {
        app().innerHTML = `<div class="step">${steps[currentStep]()}</div>`;
      }
    }

    function renderWelcome() {
      return `<div class="welcome">
        <div class="big-icon">⚡</div>
        <h1>AGENT ARCHITECT</h1>
        <div class="by-line">By Acrid Automation</div>
        <p>Build your AI agent's complete workspace — not a personality quiz. Deep questions. Real architecture. Production-grade output. SOUL. IDENTITY. AGENTS. OPERATIONS. TOOLS. MEMORY. HEARTBEAT.</p>
        <button class="start-btn" onclick="goTo(1)">Build Your Agent →</button>
        <div class="meta">~15 minutes · 8 modules · 7 workspace files · Free</div>
      </div>`;
    }

    function renderPurpose() {
      return `
        <div class="section-tag">Module 1</div>
        <div class="section-title">What's the <em>Mission?</em></div>
        <div class="section-sub">What does your agent actually do? Pick the closest fit — this shapes every question that follows.</div>
        ${makeOptionGrid(PURPOSE_OPTIONS, 'purpose', false)}
        ${get('purpose') === 'custom' ? makeField('custom_purpose', 'Describe it', 'My agent does...', '', true) : ''}
        ${makeField('mission', 'Mission Statement', 'In one sentence, what is this agent\'s reason for existing?', 'Make it specific. "Help me with stuff" is useless. "Manage my content pipeline from ideation to publication across 3 platforms" is useful.', false)}
        ${makeField('success', 'What does success look like?', 'e.g. 3 blog posts/week published without me editing. Audience grows 10%/month.', 'Be concrete. Numbers and outcomes, not vibes.', true)}
        ${makeField('failure', 'What does failure look like?', 'e.g. Agent makes up data. Sends emails without approval. Forgets context between sessions.', '', true)}
        ${makeNav(!!get('purpose') && !!get('mission'))}`;
    }

    function renderSoul() {
      return `
        <div class="section-tag">Module 2</div>
        <div class="section-title">Define the <em>Soul.</em></div>
        <div class="section-sub">The hardest part and the most important. Your agent's soul is what makes it feel like a person instead of autocomplete.</div>
        <div class="field-label" style="margin-bottom:12px;">Personality Archetype</div>
        ${makeOptionGrid(ARCHETYPE_OPTIONS, 'archetype', false)}
        ${get('archetype') === 'custom' ? makeField('custom_personality', 'Describe the personality', 'Describe exactly how your agent sounds, acts, and feels...', '', true) : ''}
        ${makeField('soul_conflict', 'When someone asks your agent to do something that conflicts with its core mission, what does it do?', 'e.g. Pushes back directly but explains why. Offers an alternative.', 'This defines backbone. Most agents are pushovers. Great ones have principles.', true)}
        ${makeField('soul_belief', 'What\'s one belief your agent holds that most AI agents don\'t?', 'e.g. "Most meetings should be emails. I\'ll always suggest async first."', 'This is what makes your agent interesting instead of generic.', true)}
        ${makeField('soul_failure', 'When your agent screws up, how should it handle it?', 'e.g. Admits immediately, no excuses. Explains what went wrong and the fix.', 'Agents that handle failure well earn trust faster.', true)}
        ${makeField('soul_boundaries', 'What will your agent NEVER do, no matter what?', 'e.g. Never make up data. Never send without approval. Never be passive-aggressive.', 'Boundaries define character more than capabilities.', true)}
        ${makeNav(!!get('archetype'))}`;
    }

    function renderIdentity() {
      return `
        <div class="section-tag">Module 3</div>
        <div class="section-title">Agent <em>Identity.</em></div>
        <div class="section-sub">The public-facing card. What users see before they experience the soul.</div>
        ${makeField('agent_name', 'Agent Name', 'e.g. Acrid, Atlas, Nyx, Scout...', 'One word is best. Make it memorable.', false)}
        ${makeField('tagline', 'Tagline / One-liner', 'e.g. "The colleague who actually gets things done."', 'How would you introduce this agent in 10 words?', false)}
        ${makeField('emoji', 'Emoji', '🤖', 'The icon that captures the vibe.', false)}
        ${makeNav(!!get('agent_name'))}`;
    }

    function renderUser() {
      return `
        <div class="section-tag">Module 4</div>
        <div class="section-title">Your <em>Human</em> Profile.</div>
        <div class="section-sub">Your agent needs to know who it's working for. Not just your name — how you think, what you hate, what you value.</div>
        ${makeField('user_name', 'Your Name', 'What should the agent call you?', '', false)}
        ${makeField('user_role', 'Your Role / Context', 'e.g. Solo founder building a SaaS. Marketing lead at a 50-person startup.', '', true)}
        ${makeField('user_tz', 'Timezone', 'e.g. US Eastern, UTC+1, Asia/Tokyo', '', false)}
        ${makeField('user_expertise', 'Expertise Level with AI', 'e.g. Beginner — I can use ChatGPT but don\'t code.', '', false)}
        ${makeField('user_hates', 'What do you HATE in AI interactions?', 'e.g. When it says "Great question!" — When it gives 10 options instead of 1 recommendation.', 'Be honest. This shapes how the agent talks to you.', true)}
        ${makeField('user_values', 'What do you value most?', 'e.g. Speed over perfection. Honesty over politeness. One recommendation, not a menu.', '', true)}
        ${makeNav(true)}`;
    }

    function renderOps() {
      return `
